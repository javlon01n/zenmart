<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenmart</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
     href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" 
     rel="stylesheet"
    />
    <link rel="stylesheet" href="/public/css/command.css">
    <link rel="stylesheet" href="/public/css/home.css">
</head>
<body>
    <div class="navbar_frame">
        <div class="container">
            <div class="navbar_top">
                <a href="index.html">
                    <img src="./public/images/icons/logo.png" alt="">
                </a>

                <div class="nav_search_frame">
                    <div class="search_box">
                        <div class="category_list">
                            <select name="" id="">
                                <option value="all" selected>All Categories</option>
                                <option value="computer">computer</option>
                            </select>
                        </div>
                        <input type="text" placeholder="Search products…"/>
                    </div>
                    <div class="search_icon_box">
                        <img src="./public/images/icons/search.svg" alt="">
                    </div>
                </div>

                <div class="nav_top_menu">
                    <div class="top_menu_box">
                        <div class="box_icon_box">
                            <img src="./public/images/icons/heart.svg">
                        </div>
                        <div class="box_info_box">
                            <span>Wishlist</span>
                            <strong>My Items</strong>
                        </div>
                    </div>
                    <div class="top_menu_box">
                        <div class="box_icon_box">
                            <img src="./public/images/icons/profile.svg">
                        </div>
                        <div class="box_info_box">
                            <span>Sign In</span>
                            <strong>Account</strong>
                        </div>
                    </div>
                    <div class="top_menu_box">
                        <div class="box_icon_box">
                            <ddiv class="basket_count">2</ddiv>
                            <img src="./public/images/icons/shopping-cart.svg">
                        </div>
                        <div class="box_info_box">
                            <span>$200.99</span>
                            <strong>Total</strong>
                        </div>
                    </div>
                </div>
            </div>
            <div class="navbar_bott">
                <div class="navbar_bott_menu_box">
                    <div class="browse_box">
                        <img src="./public/images/icons/browse.svg" >
                        <span>Browse Categories</span>
                    </div>

                    <div class="navbar_route_menu">
                        <a class="title" href="">Home</a>
                        <a href="">Shop</a>
                        <a href="">Orders</a>
                        <a href="">Abaut</a>
                        <a href="">Contact</a>
                    </div>

                    <div class="sorting_menu">
                        <span>Deal of the Day</span>
                        <span>Hot Deals</span>
                        <span>Beat Sellers</span>
                        <span>New Arrivals</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
